# Castle deploy — one public container behind Traefik + Cloudflare at
# https://car-sim.troyanenko.com
#
#   rsync to /opt/car-sim, then:
#   docker compose -f docker-compose.castle.yml up -d --build
#
# priority=100 so the all-letter wildcard catch-all router can't steal the host.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car-sim
    restart: unless-stopped
    networks:
      - web
    # SECRET_KEY (+ optional GOOGLE_CLIENT_ID/SECRET) come from /opt/car-sim/.env on Castle (NOT committed,
    # excluded from rsync). app.db lives in the carsim-data named volume so it survives image rebuilds.
    environment:
      - CARSIM_DB=/app/var/app.db
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-vladimir.troyanenko@gmail.com}
      - BASE_URL=${BASE_URL:-https://car-sim.troyanenko.com}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # out-of-band first-admin bootstrap (trusted: only Castle-shell holders set .env)
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-}
    volumes:
      - carsim-data:/app/var
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.carsim.entrypoints=websecure"
      - "traefik.http.routers.carsim.rule=Host(`car-sim.troyanenko.com`)"
      - "traefik.http.routers.carsim.tls.certresolver=cloudflare"
      - "traefik.http.routers.carsim.priority=100"
      - "traefik.http.services.carsim.loadbalancer.server.port=8080"
      # Retire the migrated standalone ulice apps (msg 2823): 301-redirect the old hosts to their new
      # /quiz/* homes so existing links keep working. Routers reuse car-sim's service; the redirect
      # middleware answers first. priority=110 cleanly takes the host over from the old containers.
      - "traefik.http.routers.uliceredir.entrypoints=websecure"
      - "traefik.http.routers.uliceredir.rule=Host(`ulice.troyanenko.com`)"
      - "traefik.http.routers.uliceredir.tls.certresolver=cloudflare"
      - "traefik.http.routers.uliceredir.priority=110"
      - "traefik.http.routers.uliceredir.service=carsim"
      - "traefik.http.routers.uliceredir.middlewares=uliceredir"
      - "traefik.http.middlewares.uliceredir.redirectregex.regex=^https?://[^/]+/.*"
      - "traefik.http.middlewares.uliceredir.redirectregex.replacement=https://car-sim.troyanenko.com/quiz/photo"
      - "traefik.http.middlewares.uliceredir.redirectregex.permanent=true"
      - "traefik.http.routers.ulicesimredir.entrypoints=websecure"
      - "traefik.http.routers.ulicesimredir.rule=Host(`ulice-sim.troyanenko.com`)"
      - "traefik.http.routers.ulicesimredir.tls.certresolver=cloudflare"
      - "traefik.http.routers.ulicesimredir.priority=110"
      - "traefik.http.routers.ulicesimredir.service=carsim"
      - "traefik.http.routers.ulicesimredir.middlewares=ulicesimredir"
      - "traefik.http.middlewares.ulicesimredir.redirectregex.regex=^https?://[^/]+/.*"
      - "traefik.http.middlewares.ulicesimredir.redirectregex.replacement=https://car-sim.troyanenko.com/quiz/situations"
      - "traefik.http.middlewares.ulicesimredir.redirectregex.permanent=true"

networks:
  web:
    external: true

volumes:
  carsim-data:
