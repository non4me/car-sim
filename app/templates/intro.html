<!doctype html>
<html lang="{{ lang }}" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>car-sim — learn to drive a real city</title>
  <style>
    :root{--panel:#141925;--line:#222a3a;--accent:#5b9cff}
    html,body{margin:0;min-height:100%;background:#0b0e14;color:#e6e9f0;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    .wrap{max-width:720px;margin:0 auto;padding:32px 20px 64px}
    h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:.2em 0}
    .accent{color:var(--accent)}
    .sub{color:#8a93a6;margin-top:6px}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin:22px 0}
    .pick{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:14px}
    .pick label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#6b7385}
    .pick b{font-weight:700}
    .citysel{display:flex;gap:6px;flex-wrap:wrap;margin-top:3px}
    .citysel a{color:#cfd6e2;text-decoration:none;font-size:14px;font-weight:700;background:#1c2330;
      border:1px solid #2a3346;border-radius:8px;padding:3px 11px;transition:border-color .12s,color .12s}
    .citysel a:hover{border-color:var(--accent);color:#fff}
    .cards{display:grid;gap:14px;margin-top:18px}
    .card{display:block;background:var(--panel);border:1px solid var(--line);border-radius:16px;
      padding:18px;text-decoration:none;color:inherit;transition:border-color .15s}
    .card:hover{border-color:rgba(91,156,255,.6)}
    .card .t{font-weight:800;font-size:18px}
    .card .d{color:#8a93a6;font-size:13px;margin-top:4px}
    .card.soon{opacity:.55}
    .card-main{display:block;text-decoration:none;color:inherit}
    .tag{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#6b7385;border:1px solid var(--line);
      border-radius:999px;padding:2px 8px;margin-left:8px}
    .dist{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .dist-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:#6b7385}
    .dist a{color:var(--accent);text-decoration:none;font-size:13px;font-weight:600}
    .dist-note{color:#6b7385;font-weight:400}
    footer{color:#5b6477;font-size:12px;margin-top:32px}
    .usermenu{display:flex;justify-content:flex-end;align-items:center;gap:16px;margin-bottom:4px}
    .usermenu a{color:#8a93a6;text-decoration:none;font-size:13px;font-weight:600}
    .usermenu a:hover{color:#e6e9f0}
    .usermenu a.cta{color:#06203f;background:var(--accent);border-radius:8px;padding:6px 12px}
    .usermenu a.cta:hover{filter:brightness(1.06)}
  </style>
</head>
<body>
  {{ hdr.header(lang, user) }}
  <div class="wrap">
    <h1><span class="accent">car</span>-sim</h1>
    <div class="sub">{{ t.sub }}</div>

    <div class="row">
      <div class="pick"><label>{{ t.country }}</label><b>🇨🇿 Česko</b></div>
      <div class="pick"><label>{{ t.city }}</label>
        <span class="citysel">{% for c in cities %}<a href="/drive?city={{ c.slug }}">{{ c.name }}</a>{% endfor %}</span>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <a class="card-main" href="/drive">
          <div class="t">🚗 {{ t.drive_t }} <span class="tag">{{ t.tag_primary }}</span></div>
          <div class="d">{{ t.drive_d }}</div>
        </a>
      </div>
      <a class="card" href="/quiz">
        <div class="t">🧠 {{ t.quiz_t }} <span class="tag">{{ t.tag_live }}</span></div>
        <div class="d">{{ t.quiz_d }}</div>
      </a>
      <a class="card" href="/docs">
        <div class="t">📖 {{ t.docs_t }} <span class="tag">{{ t.tag_live }}</span></div>
        <div class="d">{{ t.docs_d }}</div>
      </a>
    </div>

    <footer>{{ t.footer }}</footer>
  </div>
</body>
</html>
