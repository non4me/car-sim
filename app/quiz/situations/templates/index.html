<!doctype html>
<html lang="cs" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ulice Sim — dopravní situace z ptačí perspektivy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{ink:'#0b0e14',panel:'#141925',line:'#222a3a',accent:'#5b9cff',good:'#34d399',bad:'#f87171',warn:'#fbbf24'}}}}</script>
  <style>
    html,body{background:#0b0e14;color:#e6e9f0;margin:0;height:100%;overflow:hidden}
    #game{display:block;touch-action:none;background:#0c0f17}
    .fade-in{animation:fi .2s ease}@keyframes fi{from{opacity:0}to{opacity:1}}
    .btn{transition:transform .06s, filter .15s}.btn:active{transform:scale(.97)}
  </style>
</head>
<body class="h-full">
  <div class="relative w-full h-full mx-auto max-w-3xl">
    <canvas id="game"></canvas>

    <!-- top HUD -->
    <div id="hud" class="pointer-events-none absolute top-0 inset-x-0 p-3 flex items-start justify-between gap-3">
      <div class="bg-panel/80 backdrop-blur rounded-lg px-3 py-2 max-w-[75%]">
        <div id="hud-title" class="font-bold text-sm leading-tight"></div>
        <div id="hud-hint" class="text-xs text-slate-400 leading-snug mt-0.5"></div>
      </div>
      <div class="bg-panel/80 backdrop-blur rounded-lg px-3 py-2 text-right">
        <div class="text-[10px] uppercase tracking-wide text-slate-500">Body</div>
        <div id="hud-score" class="font-bold tabular-nums text-lg leading-none">100</div>
        <div id="hud-speed" class="text-[10px] text-slate-500 tabular-nums mt-1">0 km/h</div>
      </div>
    </div>

    <!-- on-screen controls -->
    <div id="controls" class="absolute bottom-0 inset-x-0 p-4 flex items-end justify-between gap-3 select-none">
      <div class="flex gap-2" id="turnbtns">
        <button data-turn="left"  class="btn ctrl w-14 h-14 rounded-xl bg-panel/90 border border-line text-2xl">↰</button>
        <button data-turn="straight" class="btn ctrl w-14 h-14 rounded-xl bg-panel/90 border border-line text-2xl">↑</button>
        <button data-turn="right" class="btn ctrl w-14 h-14 rounded-xl bg-panel/90 border border-line text-2xl">↱</button>
      </div>
      <button id="gas" class="btn w-28 h-16 rounded-2xl bg-accent text-ink font-extrabold text-lg shadow-lg shadow-accent/20">JEĎ ▶</button>
    </div>

    <!-- start / scenario menu -->
    <div id="menu" class="absolute inset-0 bg-ink/95 backdrop-blur flex flex-col items-center justify-center p-6 text-center fade-in">
      <a href="/quiz" class="absolute top-4 left-4 text-accent text-sm font-bold hover:opacity-80">← car-sim</a>
      <h1 class="text-3xl font-extrabold tracking-tight">Ulice <span class="text-accent">Sim</span></h1>
      <p class="mt-2 text-slate-400 text-sm max-w-sm">Dopravní situace z ptačí perspektivy. Projeď křižovatkou podle pravidel — a hned se dozvíš proč.</p>
      <div id="scenario-list" class="mt-6 w-full max-w-sm grid gap-2"></div>
    </div>

    <!-- freeze + explain modal -->
    <div id="feedback" class="hidden absolute inset-0 bg-ink/80 backdrop-blur-sm flex items-center justify-center p-6">
      <div class="bg-panel border border-line rounded-2xl p-5 max-w-sm w-full fade-in">
        <div id="fb-verdict" class="text-lg font-extrabold"></div>
        <div id="fb-rule" class="mt-2 text-sm text-slate-200 leading-relaxed"></div>
        <div id="fb-cite" class="mt-2 text-xs text-slate-500"></div>
        <div class="mt-4 flex gap-2">
          <button id="fb-retry" class="btn flex-1 rounded-xl bg-accent text-ink font-bold py-3">Zkusit znovu</button>
          <button id="fb-next" class="btn flex-1 rounded-xl bg-panel border border-line font-bold py-3 hidden">Další ▶</button>
        </div>
        <button id="fb-menu" class="btn mt-2 w-full text-xs text-slate-400 py-1">← Menu</button>
      </div>
    </div>
  </div>

  <script>window.SIM_BASE = "{{ base }}";</script>
  <script type="module" src="{{ base }}/static/js/game.js"></script>
</body>
</html>
